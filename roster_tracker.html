<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL Roster & Cap Tracker 2026–27</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a18;background:#fff;padding:1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.title{font-size:22px;font-weight:600}
.subtitle{font-size:13px;color:#888;margin-top:2px}
.view-tabs{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:2px solid #eee}
.view-tab{padding:.5rem 1.5rem;font-size:14px;font-weight:500;color:#888;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s}
.view-tab:hover{color:#1a1a18}
.view-tab.active{color:#1a1a18;border-bottom-color:#185FA5}
.draft-col{display:flex;flex-direction:column;gap:6px;max-width:760px}
.draft-round-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;padding:.25rem 0 .25rem .875rem;margin-top:.25rem}
.draft-row{display:grid;grid-template-columns:28px 1fr auto auto 1fr;align-items:center;gap:12px;padding:.5rem .875rem;border-radius:8px;background:#f7f7f5;border:2px solid transparent;transition:border-color .15s}
.draft-row-pos{display:flex;gap:4px;font-size:11px;font-weight:500;white-space:nowrap}
.draft-row-pos span{background:#fff;border-radius:4px;padding:1px 6px;color:#1a1a18}
.draft-row-current{border-color:#185FA5;background:#eff6ff}
.draft-row-pick{font-size:12px;font-weight:700;color:#9ca3af;text-align:center}
.draft-row-current .draft-row-pick{color:#185FA5}
.draft-row-team{display:flex;align-items:center;gap:6px;min-width:0}
.draft-row-logo{width:22px;height:22px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#e5e7eb}
.draft-row-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-row-cap{font-size:12px;color:#555;white-space:nowrap}
.draft-row-player{font-size:12px;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-entry{margin-top:1rem;max-width:760px}
.draft-results-row{padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0ee;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.draft-results-row:hover{background:#f7f7f5}
.draft-results-row:last-child{border-bottom:none}
.stats-grid{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:8px;margin-bottom:1.25rem;overflow-x:auto}
.team-card{background:#f7f7f5;border-radius:8px;padding:.5rem .625rem;display:flex;flex-direction:column;gap:5px;min-width:0}
.team-card-header{display:flex;align-items:center;gap:5px;min-width:0}
.team-card-logo{width:22px;height:22px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#e5e7eb}
.team-card-name{font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-card-cap{font-size:11px;color:#555}
.team-card-pos{display:flex;gap:4px;font-size:11px;font-weight:500}
.team-card-pos span{background:#fff;border-radius:4px;padding:1px 5px;color:#1a1a18}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.controls input,.controls select{height:36px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;padding:0 10px;font-size:13px}
.controls input{flex:1;min-width:150px}
.btn{height:36px;padding:0 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500}
.btn:hover{background:#f7f7f5}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-yahoo{background:#6001D2;color:#fff;border-color:#6001D2}
.btn-yahoo:hover{background:#4a00a8}
.btn-nhl{background:#F47F20;color:#fff;border-color:#F47F20}
.btn-nhl:hover{background:#1a1a18;border-color:#1a1a18}
.btn-puckpedia{background:#0F2446;color:#fff;border-color:#0F2446}
.btn-puckpedia:hover{background:#F00032;border-color:#F00032}
.tbl-wrap{overflow-x:auto;border:1px solid #eee;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#f7f7f5;cursor:pointer;white-space:nowrap;user-select:none;text-transform:uppercase;letter-spacing:.03em}
th:hover{color:#1a1a18}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-f{background:#dbeafe;color:#1e40af}
.badge-d{background:#dcfce7;color:#166534}
.badge-g{background:#fef3c7;color:#92400e}
.badge-nr{background:#f3f4f6;color:#6b7280;font-style:italic}
.badge-drop{background:#fee2e2;color:#991b1b}
.badge-watch{background:#fef3c7;color:#92400e}
.source-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
.dot-manual{background:#9ca3af}
.dot-yahoo{background:#6001D2}
.dot-nhl{background:#F47F20}
.edit-btn,.del-btn{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px;font-size:14px;color:#9ca3af}
.edit-btn:hover{color:#185FA5;background:#eff6ff}
.del-btn:hover{color:#dc2626;background:#fef2f2}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.5rem;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:#888;margin-bottom:4px}
.field input,.field select{width:100%;height:36px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;padding:0 10px;font-size:14px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}
.empty{text-align:center;padding:3rem;color:#9ca3af;font-size:14px}
.tx-list{max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;font-size:12px;margin-bottom:1rem}
.tx-row{padding:7px 12px;border-bottom:1px solid #f0f0ee;display:flex;gap:8px;align-items:flex-start}
.tx-row:last-child{border-bottom:none}
.tx-date{color:#9ca3af;min-width:52px;font-size:11px;padding-top:1px}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:3px}
.tag-add{background:#dcfce7;color:#166534}
.tag-drop{background:#fee2e2;color:#991b1b}
.tag-trade{background:#dbeafe;color:#1e40af}
.section-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin:1.25rem 0 .5rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#eee}
.proxy-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid #eee;background:#f7f7f5;margin-bottom:1rem;font-size:13px}
.proxy-dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.proxy-dot.green{background:#16a34a}
.proxy-dot.red{background:#dc2626}
.proxy-dot.pulse{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:.6rem 1.25rem;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="view-tabs">
  <button class="view-tab active" onclick="setView('roster')">Roster Tracker</button>
  <button class="view-tab" onclick="setView('draft')">HGHL 2026–27 Draft</button>
</div>

<div id="view-draft" style="display:none">
  <div style="display:flex;align-items:baseline;justify-content:space-between;max-width:760px;margin-bottom:.75rem">
    <span id="draftRoundLabel" style="font-size:22px;font-weight:700">Round 1</span>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="undoLastPick()" style="height:28px;font-size:12px">↩ Undo</button>
      <button class="btn" onclick="resetDraft()" style="height:28px;font-size:12px;color:#dc2626;border-color:#dc2626">Reset Draft</button>
    </div>
  </div>
  <div class="draft-col" id="draftColumn"></div>
  <div class="draft-entry">
    <div style="font-size:12px;color:#888;margin-bottom:.4rem" id="draftOnClock"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="draftSearch" placeholder="Search free agents to draft…"
             oninput="renderDraftSearch()"
             style="flex:1;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 12px;font-size:13px">
    </div>
    <div id="draftResults" style="display:none;border:1px solid #eee;border-radius:8px;margin-top:4px;max-height:240px;overflow-y:auto;background:#fff"></div>
  </div>
</div>

<div id="view-roster">
<div class="header">
  <div>
    <div class="title">NHL roster &amp; cap tracker <span style="font-size:14px;font-weight:400;color:#888">2026–27</span></div>
    <div class="subtitle" id="leagueLabel">League: 465.l.97882</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-yahoo" id="syncBtn" onclick="doSync()">⬇ Sync Yahoo</button>
    <button class="btn btn-nhl" id="nhlBtn" onclick="syncAllNHL()">🏒 Sync NHL</button>
    <button class="btn btn-puckpedia" id="signingsBtn" onclick="syncSignings()">✍ Sync Signings</button>
    <button class="btn btn-nhl" id="statsBtn" onclick="syncStats()">📊 Sync Stats</button>
    <button class="btn btn-primary" onclick="openAdd()">+ Add player</button>
  </div>
</div>

<div class="proxy-bar" id="proxyBar">
  <div class="proxy-dot pulse" id="proxyDot"></div>
  <div id="proxyStatus" style="flex:1">Checking proxy…</div>
  <button class="btn" style="height:28px;font-size:12px;padding:0 10px" onclick="checkProxy()">↺ Refresh</button>
</div>

<div class="stats-grid" id="statCards"></div>

<div id="txSection" style="display:none">
  <div class="section-label">Recent transactions</div>
  <div class="tx-list" id="txList"></div>
</div>

<div class="controls" style="margin-top:.5rem">
  <input type="text" id="search" placeholder="Search name, team, fantasy team…" oninput="render()">
  <select id="filterPos" onchange="render()">
    <option value="">All positions</option>
    <option value="F">Forwards</option>
    <option value="D">Defense</option>
    <option value="G">Goalies</option>
  </select>
  <select id="filterRoster" onchange="render()">
    <option value="">All NHL statuses</option>
    <option value="roster">NHL roster</option>
    <option value="non-roster">Non-roster (minors/LTIR)</option>
  </select>
  <select id="filterTeam" onchange="render()"></select>
  <select id="filterFantasy" onchange="render()">
    <option value="">All fantasy teams</option>
  </select>
  <select id="filterSource" onchange="render()">
    <option value="">All sources</option>
    <option value="yahoo">Yahoo</option>
    <option value="nhl">NHL API</option>
    <option value="manual">Manual</option>
  </select></div>

<div class="controls" style="margin-top:0;margin-bottom:.75rem">
  <span style="font-size:12px;color:#888;white-space:nowrap">ABP pts source:</span>
  <select id="abpPtsSrc" onchange="abpPtsSrc=this.value;render()" style="flex:0">
    <option value="pts2526">25-26 Pts/G</option>
    <option value="pts2526_raw">25-26 Pts</option>
    <option value="pts">Proj Pts/G</option>
    <option value="pts_raw">Proj Pts</option>
  </select>
  <span style="font-size:12px;color:#888;white-space:nowrap">min GP</span>
  <input type="number" id="abpMinGP" value="5" min="1" max="82" style="flex:0;width:58px" oninput="abpMinGP=+this.value||1;render()">
  <span style="font-size:12px;color:#888;white-space:nowrap">cap wiggle $M</span>
  <input type="number" id="abpWiggle" value="0.1" min="0" max="5" step="0.05" style="flex:0;width:68px" oninput="abpWiggle=+this.value;render()">
</div>

<div class="tbl-wrap">
<table>
<thead><tr>
  <th onclick="setSortCol('name')">Player <span id="sort-name"></span></th>
  <th onclick="setSortCol('pos')">Pos <span id="sort-pos"></span></th>
  <th onclick="setSortCol('age')">Age <span id="sort-age"></span></th>
  <th onclick="setSortCol('team')">NHL team <span id="sort-team"></span></th>
  <th onclick="setSortCol('fantasyTeam')">Fantasy team <span id="sort-fantasyTeam"></span></th>
  <th onclick="setSortCol('cap')">Cap hit <span id="sort-cap"></span></th>
  <th onclick="setSortCol('pts2526')">25-26 <span id="sort-pts2526"></span></th>
  <th onclick="setSortCol('gp2526')">GP <span id="sort-gp2526"></span></th>
  <th onclick="setSortCol('ptsperm')">Pts/$M <span id="sort-ptsperm"></span></th>
  <th onclick="setSortCol('pts')">Proj pts <span id="sort-pts"></span></th>
  <th onclick="setSortCol('status')">Status <span id="sort-status"></span></th>
  <th onclick="setSortCol('abp')" title="Available Better Players: free agents at the same position and similar cap hit with better pts/game">ABP <span id="sort-abp"></span></th>
  <th onclick="setSortCol('suggestedMove')">Suggested Move <span id="sort-suggestedMove"></span></th>
  <th></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div style="font-size:12px;color:#9ca3af;margin-top:.6rem;display:flex;align-items:center;gap:10px">
  <span id="rowCount"></span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span class="source-dot dot-yahoo"></span>Yahoo &nbsp;
    <span class="source-dot dot-nhl"></span>NHL &nbsp;
    <span class="source-dot dot-manual"></span>Manual
  </span>
</div>

</div><!-- /view-roster -->

<!-- Edit/Add modal -->
<div class="modal-bg" id="modal" style="display:none">
<div class="modal">
  <h2 id="modalTitle">Add player</h2>
  <div class="field"><label>Name</label><input id="fName" placeholder="e.g. Connor McDavid"></div>
  <div class="field"><label>NHL team</label><input id="fTeam" placeholder="e.g. EDM"></div>
  <div class="field"><label>Position</label>
    <select id="fPos">
      <option value="C">Center (C)</option><option value="LW">Left Wing (LW)</option>
      <option value="RW">Right Wing (RW)</option><option value="D">Defense (D)</option>
      <option value="G">Goalie (G)</option>
    </select>
  </div>
  <div class="field"><label>Cap hit ($ millions)</label><input id="fCap" type="number" step="0.01" placeholder="e.g. 12.50"></div>
  <div class="field"><label>Projected points (2026–27)</label><input id="fPts" type="number" step="1" placeholder="e.g. 95"></div>
  <div class="field"><label>NHL roster status</label>
    <select id="fStatus"><option value="roster">NHL roster</option><option value="non-roster">Non-roster (minors/LTIR)</option></select>
  </div>
  <div class="modal-actions">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="savePlayer()">Save</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = '';  // same origin — served by the proxy itself

const NHL_LOGOS = {
  ANA:'https://assets.nhle.com/logos/nhl/svg/ANA_light.svg',
  BOS:'https://assets.nhle.com/logos/nhl/svg/BOS_light.svg',
  BUF:'https://assets.nhle.com/logos/nhl/svg/BUF_light.svg',
  CAR:'https://assets.nhle.com/logos/nhl/svg/CAR_light.svg',
  CBJ:'https://assets.nhle.com/logos/nhl/svg/CBJ_light.svg',
  CGY:'https://assets.nhle.com/logos/nhl/svg/CGY_light.svg',
  CHI:'https://assets.nhle.com/logos/nhl/svg/CHI_light.svg',
  COL:'https://assets.nhle.com/logos/nhl/svg/COL_light.svg',
  DAL:'https://assets.nhle.com/logos/nhl/svg/DAL_light.svg',
  DET:'https://assets.nhle.com/logos/nhl/svg/DET_light.svg',
  EDM:'https://assets.nhle.com/logos/nhl/svg/EDM_light.svg',
  FLA:'https://assets.nhle.com/logos/nhl/svg/FLA_light.svg',
  LAK:'https://assets.nhle.com/logos/nhl/svg/LAK_light.svg',
  MIN:'https://assets.nhle.com/logos/nhl/svg/MIN_light.svg',
  MTL:'https://assets.nhle.com/logos/nhl/svg/MTL_light.svg',
  NJD:'https://assets.nhle.com/logos/nhl/svg/NJD_light.svg',
  NSH:'https://assets.nhle.com/logos/nhl/svg/NSH_light.svg',
  NYI:'https://assets.nhle.com/logos/nhl/svg/NYI_light.svg',
  NYR:'https://assets.nhle.com/logos/nhl/svg/NYR_light.svg',
  OTT:'https://assets.nhle.com/logos/nhl/svg/OTT_light.svg',
  PHI:'https://assets.nhle.com/logos/nhl/svg/PHI_light.svg',
  PIT:'https://assets.nhle.com/logos/nhl/svg/PIT_light.svg',
  SEA:'https://assets.nhle.com/logos/nhl/svg/SEA_light.svg',
  SJS:'https://assets.nhle.com/logos/nhl/svg/SJS_light.svg',
  STL:'https://assets.nhle.com/logos/nhl/svg/STL_light.svg',
  TBL:'https://assets.nhle.com/logos/nhl/svg/TBL_light.svg',
  TOR:'https://assets.nhle.com/logos/nhl/svg/TOR_light.svg',
  UTA:'https://assets.nhle.com/logos/nhl/svg/UTA_light.svg',
  VAN:'https://assets.nhle.com/logos/nhl/svg/VAN_light.svg',
  VGK:'https://assets.nhle.com/logos/nhl/svg/VGK_light.svg',
  WPG:'https://assets.nhle.com/logos/nhl/svg/WPG_light.svg',
  WSH:'https://assets.nhle.com/logos/nhl/svg/WSH_secondary_light.svg',
};
const LS_PLAYERS = 'nhl_players_v3';
const LS_TX      = 'nhl_transactions_v2';
const LS_LOGOS   = 'hghl_team_logos';
const LS_STATS   = 'hghl_stats_2526';

let players = [], transactions = [], teamLogos = {}, editId = null, sortCol = 'cap', sortDir = -1, proxyOk = false;

const posGroup = p => ['C','LW','RW','F','Util'].includes(p) ? 'F' : p === 'D' ? 'D' : p === 'G' ? 'G' : 'F';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const normName = s => s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[-.']/g,'');

function lsGet(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){return null;} }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

function dedup(){
  const srcRank = {yahoo:3, manual:2, nhl:1};
  const seen = new Map();
  for(const p of players){
    const k = `${normName(p.name).toLowerCase()}_${posGroup(p.pos)}`;
    if(!seen.has(k) || (srcRank[p.source]||0) > (srcRank[seen.get(k).source]||0))
      seen.set(k, p);
  }
  const before = players.length;
  players = [...seen.values()];
  if(players.length < before){
    console.log(`Deduped ${before - players.length} duplicate player(s)`);
    lsSet(LS_PLAYERS, players);
  }
}

function load(){
  players      = lsGet(LS_PLAYERS) || defaultPlayers();
  transactions = lsGet(LS_TX)      || [];
  teamLogos    = lsGet(LS_LOGOS)   || {};
  dedup(); loadDraft();
  populateTeamFilter(); populateFantasyFilter(); renderTransactions(); render();
  checkProxy();
}

async function syncStats(){
  const btn = document.getElementById('statsBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Syncing 32 teams…';
  try {
    const d = await fetch('/stats').then(r=>r.json());
    if(d.error) throw new Error(d.error);
    let matched=0, unmatched=0;
    for(const p of players){
      const key = `${normName(p.name).toLowerCase()}_${posGroup(p.pos)}`;
      if(d.players[key]){
        p.pts2526 = d.players[key].fpts;
        p.gp2526  = d.players[key].gp;
        matched++;
      } else {
        unmatched++;
      }
    }
    lsSet(LS_PLAYERS, players);
    lsSet(LS_STATS, d.players);
    render();
    toast(`Stats synced! ${matched} players updated, ${unmatched} unmatched.`);
    if(d.errors.length) console.warn('Stats errors:', d.errors);
  } catch(e){
    toast('Stats sync failed: '+e.message);
  } finally {
    btn.disabled=false;
    btn.innerHTML='📊 Sync Stats';
  }
}

function defaultPlayers(){

async function syncSignings(){
  if(!proxyOk){ toast('Start the proxy first.'); return; }
  const btn = document.getElementById('signingsBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching (~15s)…';
  try {
    toast('Fetching all current contracts from PuckPedia signings — this takes ~15 seconds…');
    const d = await fetch('/signings').then(r=>r.json());
    if(d.error) throw new Error(d.error);

    const expiredSet = new Set(d.expired || []);
    let matched=0, cleared=0, unmatched=0;
    for(const p of players){
      const key = `${normName(p.name).toLowerCase()}_${posGroup(p.pos)}`;
      if(d.players[key]){
        const s = d.players[key];
        p.cap = s.cap;
        if(!p.team || p.team==='—') p.team = s.team;
        p.contractTerm = s.term || 0;
        p.expYear      = s.exp_year || 0;
        if(s.birthDate && !p.birthDate) p.birthDate = s.birthDate;
        matched++;
      } else if(expiredSet.has(key)){
        // Contract expired — clear stale cap data
        p.cap = 0; p.contractTerm = 0; p.expYear = 0;
        cleared++;
      } else {
        unmatched++;
      }
    }
    lsSet(LS_PLAYERS, players);
    render();
    const clearedMsg = cleared ? `, ${cleared} expired contracts cleared` : '';
    toast(`Signings sync done! ${matched} updated${clearedMsg}, ${unmatched} unmatched.`);
    if(d.errors.length) console.warn('Signings page errors:', d.errors);
  } catch(e){
    toast('Signings sync failed: '+e.message);
  } finally {
    btn.disabled=false;
    btn.innerHTML='✍ Sync Signings';
  }
}

async function doSync(){

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Syncing…';

    document.getElementById('leagueLabel').textContent = `League: ${lg.league.name} (465.l.97882)`;

    const rd = await fetch('/rosters').then(r=>r.json());
    if(rd.error) throw new Error(rd.error);

    let added=0, updated=0;
    for(const yp of rd.players){
      const ex = players.find(p=>normName(p.name).toLowerCase()===normName(yp.name).toLowerCase() && posGroup(p.pos)===posGroup(yp.pos));
      if(ex){
        ex.fantasyTeam = yp.fantasyTeam;
        if(yp.nhlTeam && yp.nhlTeam!=='—') ex.team = yp.nhlTeam;
        ex.source = 'yahoo'; updated++;
      } else {
        const newId = players.length>0 ? Math.max(...players.map(p=>p.id))+1 : 1;
        players.push({id:newId,name:yp.name,team:yp.nhlTeam,pos:yp.pos,cap:0,pts:0,status:'roster',source:'yahoo',fantasyTeam:yp.fantasyTeam});
        added++;
      }
    }

    const td = await fetch('/transactions').then(r=>r.json());
    if(!td.error && td.transactions){ transactions=td.transactions; lsSet(LS_TX,transactions); }

    // Fetch team logos (best-effort — don't fail the whole sync if this errors)
    try {
      const ld = await fetch('/teamlogos').then(r=>r.json());
      if(ld.ok && ld.logos){ teamLogos = ld.logos; lsSet(LS_LOGOS, teamLogos); }
    } catch(_){}

    // Update NHL roster status for all players
    const nr = await fetch('/nhlrosters').then(r=>r.json());
    let rosterUpdated = 0;
    if(!nr.error && nr.active){
      for(const p of players){
        const prev = p.status;
        const nhlKey = `${normName(p.name).toLowerCase()}_${posGroup(p.pos)}`;
        p.status = nr.active[nhlKey] ? 'roster' : 'non-roster';
        if(p.status !== prev) rosterUpdated++;
      }
    }
    // Promote source from 'nhl' to 'yahoo' for fantasy-rostered players
    for(const p of players){
      if(p.source === 'nhl' && p.fantasyTeam) p.source = 'yahoo';
    }

    lsSet(LS_PLAYERS, players);
    populateTeamFilter(); populateFantasyFilter(); renderTransactions(); render();
    toast(`Synced! ${added} added, ${updated} updated, ${transactions.length} transactions, ${rosterUpdated} roster status changes.`);
  } catch(e){
    toast('Sync failed: '+e.message);
    console.error(e);
  } finally {
    btn.disabled=false;
    btn.innerHTML='⬇ Sync Yahoo';
  }
}

function setSortCol(col){ if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=-1;} render(); }

function computeDrops(allPlayers){
  // 0/1 knapsack: for each fantasy team, find the subset of players that
  // maximises total extrapolated pts while keeping total cap ≤ $104M and
  // dropping at least 7 players. Players without pts/cap data are excluded
  // from the optimisation and are not flagged.
  const MIN_DROPS  = 7;
  const SCALE      = 10;                       // $0.1 M units → integers
  const CAP_UNITS  = Math.round(CAP_LIMIT * SCALE); // 1040

  const pts82 = p => (p.pts2526>0 && p.gp2526>0) ? p.pts2526/p.gp2526*82 : null;

  const dropIds = new Set();
  const ftNames = [...new Set(allPlayers.map(p=>p.fantasyTeam).filter(Boolean))];

  for(const ft of ftNames){
    const roster     = allPlayers.filter(p => p.fantasyTeam === ft);
    const evaluable  = roster.filter(p => pts82(p) !== null && p.cap > 0);
    const m          = evaluable.length;
    if(m === 0) continue;

    const maxKeep = Math.max(roster.length - MIN_DROPS, 0);
    const W = evaluable.map(p => Math.round(p.cap * SCALE));
    const V = evaluable.map(p => pts82(p));

    // Build 2D DP table: dp[i+1][c] = max pts using items 0..i with cap ≤ c.
    // Prefer-include on ties so reconstruction is unambiguous.
    const dp = Array.from({length: m+1}, () => new Float32Array(CAP_UNITS+1));
    for(let i=0; i<m; i++){
      const w=W[i], v=V[i];
      for(let c=0; c<=CAP_UNITS; c++){
        dp[i+1][c] = dp[i][c];
        if(c >= w && dp[i][c-w]+v >= dp[i+1][c])
          dp[i+1][c] = dp[i][c-w]+v;
      }
    }

    // Reconstruct which items are in the optimal solution
    const keptSet = new Set();
    let remC = CAP_UNITS;
    for(let i=m-1; i>=0; i--){
      const w=W[i], v=V[i];
      if(remC >= w && Math.abs(dp[i+1][remC] - (dp[i][remC-w]+v)) < 0.01){
        keptSet.add(evaluable[i].id);
        remC -= w;
      }
    }

    // Enforce min-drops: if knapsack kept too many, drop the lowest-pts ones
    if(keptSet.size > maxKeep){
      evaluable
        .filter(p => keptSet.has(p.id))
        .sort((a,b) => pts82(a)-pts82(b))
        .slice(0, keptSet.size-maxKeep)
        .forEach(p => keptSet.delete(p.id));
    }

    // Flag evaluable players not selected as keep
    evaluable.forEach(p => { if(!keptSet.has(p.id)) dropIds.add(p.id); });
  }
  return dropIds;
}

    if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  ['name','pos','age','team','fantasyTeam','cap','pts2526','gp2526','ptsperm','pts','status','abp','suggestedMove'].forEach(c=>{

          <span class="source-dot dot-${esc(src)}" title="${esc(src)}"></span>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</span>
        </div>
      </td>

      <td><div style="display:flex;align-items:center;gap:5px">${NHL_LOGOS[p.team]?`<img src="${NHL_LOGOS[p.team]}" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" loading="lazy">`:''}${esc(p.team||'—')}</div></td>
      <td style="color:${p.fantasyTeam?'#1a1a18':'#9ca3af'}">
        <div style="display:flex;align-items:center;gap:5px">
          ${p.fantasyTeam&&teamLogos[p.fantasyTeam]?`<img src="${teamLogos[p.fantasyTeam]}" style="width:20px;height:20px;border-radius:3px;object-fit:cover;flex-shrink:0" loading="lazy">`:''}
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(p.fantasyTeam||'—')}</span>
        </div>
      </td>
      <td>${p.cap>0?'$'+p.cap.toFixed(2)+'M':'—'}${p.cap>0?`<div style="font-size:10px;color:#9ca3af;margin-top:1px">${contractYearStr(p)||'—'}</div>`:''}</td>
      <td>${p.pts2526>0?p.pts2526:'—'}</td>
      <td>${p.gp2526>0?p.gp2526:'—'}</td>
      <td>${p.pts2526>0&&p.gp2526>0&&p.cap>0?((p.pts2526/p.gp2526*82)/p.cap).toFixed(1):'—'}</td>
      <td>${pg==='G'?'—':(p.pts>0?p.pts:'—')}</td>
      <td>${p.status==='non-roster'?'<span class="badge badge-nr" title="Non-roster: minors / LTIR / waived">NR</span>':''}</td>
      <td>${(()=>{const n=abpMap.get(p.id);if(n===null||n===undefined)return'—';const c=n===0?'color:#16a34a;font-weight:600':n<=3?'color:#1a1a18':n<=7?'color:#d97706;font-weight:600':'color:#dc2626;font-weight:600';return`<span style="${c}">${n}</span>`;})()}</td>
      <td>${isDrop?'<span class="badge badge-drop">Drop</span>':(!p.fantasyTeam?'':'')}</td>

const NHL_SEASON_YEAR = 2026;

// Draft order array: rank 9 first (worst team picks first)
const DRAFT_TEAMS = Object.entries(DRAFT_STANDINGS)
  .sort((a,b) => b[1].rank - a[1].rank)
  .map(([name]) => name);

const LS_DRAFT = 'hghl_draft_2627';
let draftState = {picks: []};  // picks: [{team, player, pos, nhlTeam}]

function loadDraft(){ draftState = lsGet(LS_DRAFT) || {picks: []}; }
function saveDraft(){ lsSet(LS_DRAFT, draftState); }
function resetDraft(){ if(confirm('Reset the entire draft?')){ draftState={picks:[]}; saveDraft(); renderDraftView(); } }

function makeDraftPick(player, pos, nhlTeam, cap){
  const team = DRAFT_TEAMS[draftState.picks.length % 9];
  draftState.picks.push({team, player, pos, nhlTeam, cap});
  saveDraft();
  document.getElementById('draftSearch').value = '';
  document.getElementById('draftResults').style.display = 'none';
  renderDraftView();
}

function undoLastPick(){
  if(!draftState.picks.length) return;
  draftState.picks.pop();
  saveDraft();
  renderDraftView();
}

let currentView = 'roster';

function setView(v){

  document.getElementById('view-draft').style.display  = v==='draft'  ? '' : 'none';

    t.classList.toggle('active', (i===0 && v==='roster') || (i===1 && v==='draft'));
  });
  if(v==='draft') renderDraftView();
}

function renderDraftView(){
  const picks    = draftState.picks;
  const total    = picks.length;
  const curRound = Math.floor(total / 9) + 1;

  document.getElementById('draftRoundLabel').textContent = `Round ${curRound}`;
  document.getElementById('draftOnClock').textContent =
    `On the clock: ${DRAFT_TEAMS[total % 9]} — Pick ${total + 1} (Round ${curRound}, #${total % 9 + 1})`;

  // Sliding window: start 4 picks back, show through end of current round,
  // then preview first 3 picks of the next round.
  const startN      = Math.max(0, total - 4);
  const endOfRound  = curRound * 9 - 1;   // last global pick index of current round
  const endN        = endOfRound + 1;      // peek at first pick of next round only

  let html = '';
  let lastRound = null;

  for(let n = startN; n <= endN; n++){
    const round   = Math.floor(n / 9) + 1;
    const teamIdx = n % 9;
    const team    = DRAFT_TEAMS[teamIdx];
    const pick    = picks[n];              // defined only if already picked
    const isCurrent  = n === total;
    const showPlayer = pick && n >= total - 4;

    if(round !== lastRound){
      html += `<div class="draft-round-hdr">Round ${round}</div>`;
      lastRound = round;
    }

    const logo   = teamLogos[team];
    const roster = players.filter(p => p.fantasyTeam === team);
    const cap    = roster.reduce((s,p) => s+(p.cap||0), 0);
    const rem    = CAP_LIMIT - cap;
    const remColor = rem < 5 ? '#dc2626' : rem < 15 ? '#d97706' : '#16a34a';
    const fN = roster.filter(p=>posGroup(p.pos)==='F').length;
    const dN = roster.filter(p=>posGroup(p.pos)==='D').length;
    const gN = roster.filter(p=>posGroup(p.pos)==='G').length;

    html += `<div class="draft-row${isCurrent ? ' draft-row-current' : ''}">
      <div class="draft-row-pick">${teamIdx + 1}</div>
      <div class="draft-row-team">
        ${logo ? `<img src="${esc(logo)}" class="draft-row-logo" loading="lazy">` : '<div class="draft-row-logo"></div>'}
        <span class="draft-row-name">${esc(team)}</span>
      </div>
      <div class="draft-row-cap">$${cap.toFixed(1)}M &bull; <span style="color:${remColor}">$${rem.toFixed(1)}M left</span></div>
      <div class="draft-row-pos"><span>F&thinsp;${fN}</span><span>D&thinsp;${dN}</span><span>G&thinsp;${gN}</span></div>
      <div class="draft-row-player">${showPlayer
        ? `${esc(pick.player)} &bull; ${esc(pick.pos)} &bull; ${esc(pick.nhlTeam||'—')}${pick.cap>0?` &bull; $${pick.cap.toFixed(2)}M`:''}`
        : ''}</div>
    </div>`;
  }

  document.getElementById('draftColumn').innerHTML = html;
  renderDraftSearch();
}

function renderDraftSearch(){
  const q = (document.getElementById('draftSearch')?.value || '').toLowerCase().trim();
  const res = document.getElementById('draftResults');
  if(!q){ res.style.display='none'; return; }

  const drafted = new Set(draftState.picks.map(p => normName(p.player).toLowerCase()));
  const fa = players
    .filter(p => !p.fantasyTeam && normName(p.name).toLowerCase().includes(q) && !drafted.has(normName(p.name).toLowerCase()))
    .sort((a,b) => (b.pts2526||0)-(a.pts2526||0))
    .slice(0, 12);

  if(!fa.length){ res.style.display='none'; return; }
  res.style.display = '';
  res.innerHTML = fa.map(p =>
    `<div class="draft-results-row" onclick="makeDraftPick('${esc(p.name)}','${esc(p.pos)}','${esc(p.team||'—')}',${p.cap||0})">
      <span>${esc(p.name)}</span>
      <span style="color:#9ca3af;font-size:12px">${esc(p.pos)} &bull; ${esc(p.team||'—')}${p.pts2526?` &bull; ${p.pts2526}pts`:''}</span>
    </div>`
  ).join('');
}

// ABP config — updated live by the controls row
let abpPtsSrc = 'pts2526';
let abpMinGP  = 5;
let abpWiggle = 0.1;   // $M

function getPPG(p){
  if(abpPtsSrc === 'pts2526'){
    if(!(p.pts2526 > 0) || !(p.gp2526 >= abpMinGP)) return null;
    return p.pts2526 / p.gp2526;
  } else if(abpPtsSrc === 'pts2526_raw'){
    if(!(p.pts2526 > 0) || !(p.gp2526 >= abpMinGP)) return null;
    return p.pts2526;
  } else if(abpPtsSrc === 'pts_raw'){
    if(!(p.pts > 0)) return null;
    return p.pts;
  } else {
    if(!(p.pts > 0)) return null;
    return p.pts / 82;
  }
}

function computeABP(allPlayers){
  // Free agents with a cap hit and enough data to evaluate
  const fas = allPlayers.filter(p => !p.fantasyTeam && p.cap > 0 && getPPG(p) !== null);
  const abpMap = new Map();
  for(const p of allPlayers){
    const ppg = getPPG(p);
    if(ppg === null || p.cap <= 0){ abpMap.set(p.id, null); continue; }
    const pg  = posGroup(p.pos);
    const cap = p.cap + abpWiggle;
    abpMap.set(p.id, fas.filter(fa =>
      fa.id !== p.id && posGroup(fa.pos) === pg && fa.cap <= cap && getPPG(fa) > ppg
    ).length);
  }
  return abpMap;
}

const calcAge = p => {
  if(!p.birthDate) return null;
  const today = new Date(), dob = new Date(p.birthDate);
  let age = today.getFullYear() - dob.getFullYear();
  if(today.getMonth() < dob.getMonth() ||
     (today.getMonth() === dob.getMonth() && today.getDate() < dob.getDate())) age--;
  return age;
};

const contractYearStr = p => {
  if(!p.contractTerm || !p.expYear) return '';
  const yr = NHL_SEASON_YEAR - p.expYear + p.contractTerm;
  return (yr >= 1 && yr <= p.contractTerm) ? `Yr ${yr} / ${p.contractTerm}` : '';
};

function updateStats(){
  const teams = [...new Set(players.map(p=>p.fantasyTeam).filter(Boolean))].sort();
  if(!teams.length){ document.getElementById('statCards').innerHTML=''; return; }
  document.getElementById('statCards').innerHTML = teams.map(t => {
    const tp = players.filter(p=>p.fantasyTeam===t);
    const cap = tp.reduce((s,p)=>s+(p.cap||0), 0);
    const rem = CAP_LIMIT - cap;
    const fN = tp.filter(p=>posGroup(p.pos)==='F').length;
    const dN = tp.filter(p=>posGroup(p.pos)==='D').length;
    const gN = tp.filter(p=>posGroup(p.pos)==='G').length;
    const logo = teamLogos[t];
    const remColor = rem < 5 ? '#dc2626' : rem < 15 ? '#d97706' : '#16a34a';
    return `<div class="team-card">
      <div class="team-card-header">
        ${logo ? `<img src="${esc(logo)}" class="team-card-logo" loading="lazy">` : '<div class="team-card-logo"></div>'}
        <span class="team-card-name" title="${esc(t)}">${esc(t)}</span>
      </div>
      <div class="team-card-cap">$${cap.toFixed(1)}M &bull; <span style="color:${remColor}">$${rem.toFixed(1)}M left</span></div>
      <div class="team-card-pos">
        <span>F&thinsp;${fN}</span><span>D&thinsp;${dN}</span><span>G&thinsp;${gN}</span>
      </div>
    </div>`;
  }).join('');
}

function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add player';
  ['fName','fTeam','fCap','fPts'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPos').value='C';
  document.getElementById('fStatus').value='roster';
  document.getElementById('modal').style.display='flex';
}
function openEdit(id){
  const p=players.find(x=>x.id===id); if(!p) return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit player';
  document.getElementById('fName').value=p.name;
  document.getElementById('fTeam').value=p.team;
  document.getElementById('fPos').value=p.pos;
  document.getElementById('fCap').value=p.cap;
  document.getElementById('fPts').value=p.pts;
  document.getElementById('fStatus').value=p.status;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
function savePlayer(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('Enter a player name.');return;}
  const team=document.getElementById('fTeam').value.trim().toUpperCase()||'—';
  const pos=document.getElementById('fPos').value;
  const cap=parseFloat(document.getElementById('fCap').value)||0;
  const pts=parseInt(document.getElementById('fPts').value)||0;
  const status=document.getElementById('fStatus').value;
  if(editId!==null){
    const idx=players.findIndex(p=>p.id===editId);
    if(idx>-1) players[idx]={...players[idx],name,team,pos,cap,pts,status};
  } else {
    const newId=players.length>0?Math.max(...players.map(p=>p.id))+1:1;
    players.push({id:newId,name,team,pos,cap,pts,status,source:'manual',fantasyTeam:''});
  }
  lsSet(LS_PLAYERS,players); populateTeamFilter(); populateFantasyFilter(); render(); closeModal();
  toast(editId!==null?'Player updated.':'Player added.');
}
function deletePlayer(id){
  const p=players.find(x=>x.id===id);
  if(!p||!confirm(`Remove ${p.name}?`)) return;
  players=players.filter(x=>x.id!==id);
  lsSet(LS_PLAYERS,players); populateTeamFilter(); populateFantasyFilter(); render();
  toast('Player removed.');
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
load();
</script>
